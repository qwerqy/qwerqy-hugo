<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="{{ .Site.Params.themeColor }}" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}" />
<meta name="author" content="{{ .Site.Params.author }}" />
{{ if .Params.keywords }}<meta name="keywords" content="{{ delimit .Params.keywords ", " }}" />{{ end }}

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta property="og:description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:image" content="{{ .Site.Params.siteUrl }}/static/images/avatar.png" />
<meta property="og:locale" content="en-US" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta name="twitter:description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Description }}{{ end }}" />

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}" />

<!-- Favicons -->
<link rel="shortcut icon" href="/static/favicons/favicon.ico" />
<link rel="apple-touch-icon" href="/static/favicons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicons/favicon-16x16.png" />
<link rel="manifest" href="/static/favicons/site.webmanifest" />

<!-- RSS -->
{{ range .AlternativeOutputFormats -}}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}" />
{{ end -}}

<!-- Yandex Verification -->
<meta name="yandex-verification" content="{{ .Site.Params.yandexVerification }}" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'snow-pink': '#e8c4c4',
          'snow-skin': '#f2e5e5',
          'snow-pome': '#ce7777',
          'snow-navy': '#2b3a55',
          'snow-dark-navy': '#151C29',
        },
        fontFamily: {
          body: ['Inter', 'sans-serif'],
          heading: ['Barlow', 'sans-serif'],
        },
      }
    }
  }
</script>

<!-- Custom Styles -->
<style>
  html { min-width: 360px; scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, h4, h5, h6 { font-family: 'Barlow', sans-serif; }

  /* Prose styling for dark mode */
  .prose { color: #d4d4d8; }
  .prose h1, .prose h2, .prose h3, .prose h4 { color: #e8c4c4; font-family: 'Barlow', sans-serif; }
  .prose a { color: #ce7777; text-decoration: underline; }
  .prose a:hover { color: #f2e5e5; }
  .prose code { color: #ec4899; background: #1f2937; padding: 0.1em 0.3em; border-radius: 0.25em; font-size: 0.875em; }
  .prose pre { background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; }
  .prose pre code { color: #d1d5db; background: none; padding: 0; }
  .prose blockquote { border-left: 4px solid #e8c4c4; color: #a1a1aa; padding-left: 1rem; }
  .prose strong { color: #f4f4f5; }
  .prose ul li::marker { color: #71717a; }
  .prose ol li::marker { color: #71717a; }
  .prose hr { border-color: #3f3f46; }
  .prose table thead th { color: #f4f4f5; border-bottom-color: #52525b; }
  .prose table tbody tr { border-bottom-color: #3f3f46; }
  .prose img { border-radius: 0.5rem; margin: 1.5rem auto; }

  /* Mobile menu */
  .nav-mobile { display: none; }
  @media (max-width: 640px) {
    .nav-desktop { display: none; }
    .nav-mobile { display: block; }
  }

  /* Syntax highlight override */
  .highlight pre { background: #282c34 !important; border: 1px solid #374151; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; }
  .highlight { margin: 1.5rem 0; }

  /* Link hover */
  a.link-hover:hover { text-decoration: underline; }
</style>
